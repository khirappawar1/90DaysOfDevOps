services:
  web:
    build: .
    container_name: flask-app
    ports:
      - 5000:5000
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      REDIS_HOST: redis
    networks:
      - backend
  
  db:
    image: postgres:15
    container_name: postgres-db

    restart: always
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mydb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - backend
  redis:
    image: redis:7

    container_name: redis-cache

    networks:
      - backend

networks:
  backend:

volumes:
  postgres_data:
    